{{- include "coog.rabbitmq.assertOperatorMode" . }}
{{- if eq (include "coog.rabbitmq.operatorMode" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-rabbitmq-credentials" (include "general.names.short" .) }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "general.labels.standard" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.rabbitmq.auth.username | quote }}
  password: {{ .Values.rabbitmq.auth.password | quote }}
{{- end }}
