# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Test RabbitMQ User CRD
templates:
  - rabbitmq/user.yaml
release:
  name: test
  namespace: test
capabilities:
  majorVersion: 1
  minorVersion: 29
tests:
  - it: Renders nothing in legacy mode (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: Renders User CRD with default tags and importCredentialsSecret
    set:
      rabbitmq:
        mode: operator
        isManaged: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: User
      - equal:
          path: apiVersion
          value: rabbitmq.com/v1beta1
      - equal:
          path: metadata.name
          value: test-coog-rabbitmq-user
      - equal:
          path: metadata.namespace
          value: test
      - equal:
          path: spec.tags[0]
          value: management
      - equal:
          path: spec.rabbitmqClusterReference.name
          value: rabbitmq-production
      - equal:
          path: spec.rabbitmqClusterReference.namespace
          value: rabbitmq-system
      - equal:
          path: spec.importCredentialsSecret.name
          value: test-coog-rabbitmq-credentials

  - it: Custom user tags are honored
    set:
      rabbitmq:
        mode: operator
        isManaged: false
        operator:
          user:
            tags:
              - management
              - monitoring
    asserts:
      - equal:
          path: spec.tags[0]
          value: management
      - equal:
          path: spec.tags[1]
          value: monitoring
