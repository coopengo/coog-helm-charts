# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Test RabbitMQ operator credentials Secret
templates:
  - rabbitmq/secret.yaml
release:
  name: test
  namespace: test
capabilities:
  majorVersion: 1
  minorVersion: 29
tests:
  - it: Renders nothing in legacy mode (default)
    set:
      rabbitmq:
        auth:
          username: coog
          password: changeme
    asserts:
      - hasDocuments:
          count: 0

  - it: Renders the credentials Secret in operator mode
    set:
      rabbitmq:
        mode: operator
        isManaged: false
        auth:
          username: tenant-user
          password: super-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-coog-rabbitmq-credentials
      - equal:
          path: metadata.namespace
          value: test
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData.username
          value: tenant-user
      - equal:
          path: stringData.password
          value: super-secret
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: coog-rabbitmq
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test

  - it: Fails if operator mode is set without disabling Bitnami sub-chart
    set:
      rabbitmq:
        mode: operator
        isManaged: true
        auth:
          username: coog
          password: changeme
    asserts:
      - failedTemplate:
          errorMessage: "rabbitmq.mode=operator requires rabbitmq.isManaged=false to disable the Bitnami sub-chart and avoid a double deployment."
